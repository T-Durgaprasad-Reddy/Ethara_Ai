spring.application.name=taskmanager
server.port=${PORT:8081}
server.address=0.0.0.0

# Database Configuration
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/ethara_ai}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:0000}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration (Custom)
ethara.app.jwtSecret=${JWT_SECRET:TaskManagementAppSecretKeyForJWTAuthTokenGenerationMustBeLongEnough}
ethara.app.jwtExpirationMs=${JWT_EXPIRATION:86400000}

# Logging
logging.level.org.springframework.security=DEBUG
